<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="robots" content="noindex" />
        <title>Nutrition Widget — Preview</title>
        <!--
            Editorial widget redesign per the design handoff:
            - Serif numerals (Instrument Serif → New York fallback), Helvetica everywhere else
            - Sunset palette (default) or Vault palette (?palette=vault)
            - Layout: header → insight → rule → hero (kcal + deficit) → gradient bar →
              3-col macros → rule → forecast | weight sparkline → rule → 7-col week bar chart → footer

            URL params:
              ?theme=dark            force dark
              ?palette=vault         switch to vault palette
              ?token=…&date=…        fetch real data instead of sample
        -->
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
            crossorigin
        />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <style>
            :root,
            [data-palette="sunset"][data-theme="light"] {
                --page: #efe6d2;
                --card: #fbf5e6;
                --ink1: #1f140c;
                --ink2: #6a5945;
                --ink3: #a89878;
                --ink4: #d1c3a4;
                --rule: rgba(31, 20, 12, 0.1);
                --rule-soft: rgba(31, 20, 12, 0.06);
                --track: rgba(31, 20, 12, 0.08);
                --protein: #e04e2a;
                --carbs: #e0a21a;
                --fat: #7a52d0;
                --positive: #1e8e5c;
                --today: #d6336e;
                --chartLine: #1f140c;
                --shadow:
                    0 24px 48px -28px rgba(0, 0, 0, 0.25);
            }
            [data-palette="sunset"][data-theme="dark"] {
                --page: #0a0805;
                --card: #16110a;
                --ink1: #f7efdb;
                --ink2: #bbae94;
                --ink3: #857967;
                --ink4: #3a3128;
                --rule: rgba(247, 239, 219, 0.16);
                --rule-soft: rgba(247, 239, 219, 0.08);
                --track: rgba(247, 239, 219, 0.14);
                --protein: #ff8260;
                --carbs: #ffcb55;
                --fat: #b49cff;
                --positive: #6ee6ac;
                --today: #ff6b92;
                --chartLine: #f7efdb;
                --shadow:
                    0 24px 60px -24px rgba(0, 0, 0, 0.8),
                    0 0 0 0.5px rgba(255, 255, 255, 0.04);
            }
            [data-palette="vault"][data-theme="light"] {
                --page: #e8e8ec;
                --card: #f6f6f8;
                --ink1: #0b0f18;
                --ink2: #5a6072;
                --ink3: #9097a8;
                --ink4: #bfc4d2;
                --rule: rgba(11, 15, 24, 0.1);
                --rule-soft: rgba(11, 15, 24, 0.06);
                --track: rgba(11, 15, 24, 0.08);
                --protein: #e5006a;
                --carbs: #ffb400;
                --fat: #1466ff;
                --positive: #00a86b;
                --today: #ff2e63;
                --chartLine: #0b0f18;
                --shadow: 0 24px 48px -28px rgba(0, 0, 0, 0.25);
            }
            [data-palette="vault"][data-theme="dark"] {
                --page: #000000;
                --card: #0a0b0f;
                --ink1: #f5f7fb;
                --ink2: #aab3ca;
                --ink3: #737c90;
                --ink4: #2e3447;
                --rule: rgba(245, 247, 251, 0.18);
                --rule-soft: rgba(245, 247, 251, 0.08);
                --track: rgba(245, 247, 251, 0.14);
                --protein: #ff4d90;
                --carbs: #ffd850;
                --fat: #6d9aff;
                --positive: #5cf5a8;
                --today: #ff6680;
                --chartLine: #f5f7fb;
                --shadow:
                    0 24px 60px -24px rgba(0, 0, 0, 0.8),
                    0 0 0 0.5px rgba(255, 255, 255, 0.04);
            }

            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
                background: var(--page);
                color-scheme: light dark;
                font-family:
                    -apple-system, BlinkMacSystemFont, "SF Pro Text",
                    "Helvetica Neue", Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .stage {
                min-height: 100dvh;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                padding: 32px 16px;
                gap: 18px;
                flex-direction: column;
                align-items: center;
            }
            .controls {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                justify-content: center;
                font-size: 12px;
                color: var(--ink2);
            }
            .controls button {
                font: inherit;
                border: 1px solid color-mix(in srgb, var(--ink1) 20%, transparent);
                background: color-mix(in srgb, var(--card) 70%, transparent);
                color: var(--ink1);
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
            }
            .controls button[aria-pressed="true"] {
                background: var(--ink1);
                color: var(--card);
                border-color: var(--ink1);
            }

            /* Large widget surface — 338 × 354 pt rendered at 1.4× for preview legibility. */
            .frame {
                padding: 28px;
                border-radius: 44px;
            }
            .widget {
                width: 473px; /* 338 × 1.4 */
                height: 496px; /* 354 × 1.4 */
                background: var(--card);
                color: var(--ink1);
                border-radius: 42px; /* 30 × 1.4 */
                padding: 25px 28px 22px 28px; /* 18/20/16 × 1.4 */
                box-shadow: var(--shadow);
                display: flex;
                flex-direction: column;
                position: relative;
                overflow: hidden;
            }

            /* --- Type primitives --- */
            .serif {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-weight: 400;
            }
            .italic {
                font-style: italic;
            }
            .eyebrow {
                font-family:
                    -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-size: 11.9px; /* 8.5 × 1.4 */
                font-weight: 600;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                line-height: 1;
                color: var(--ink3);
            }
            .body {
                font-size: 14.7px; /* 10.5 × 1.4 */
                line-height: 1.4;
                color: var(--ink2);
            }
            .tnum {
                font-feature-settings: "tnum" 1, "lnum" 1;
            }

            .row {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .row.between {
                justify-content: space-between;
            }
            .rule {
                height: 1px;
                background: var(--rule);
                width: 100%;
            }
            .rule-soft {
                height: 1px;
                background: var(--rule-soft);
                width: 100%;
            }

            /* --- Header --- */
            .h {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .h .today {
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }
            .h .today .label {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-style: italic;
                font-size: 23.8px; /* 17 × 1.4 */
                color: var(--ink1);
                letter-spacing: -0.005em;
                line-height: 1;
            }
            .h .today .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--today);
                box-shadow: 0 0 0 4px
                    color-mix(in srgb, var(--today) 18%, transparent);
            }

            /* --- Hero --- */
            .hero {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                gap: 16px;
            }
            .hero .left .eyebrow,
            .hero .right .eyebrow {
                color: var(--ink3);
            }
            .hero .right .eyebrow.deficit-eb {
                color: var(--positive);
            }
            .hero .left {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .hero .num {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 50.4px; /* 36 × 1.4 — trimmed from 42 to fit */
                line-height: 0.95;
                color: var(--ink1);
                letter-spacing: -0.025em;
                font-feature-settings: "tnum" 1, "lnum" 1;
                white-space: nowrap;
            }
            .hero .target {
                font-size: 14px; /* 10 × 1.4 */
                color: var(--ink3);
                letter-spacing: 0.02em;
            }
            .hero .right {
                text-align: right;
                display: flex;
                flex-direction: column;
                gap: 3px;
                align-items: flex-end;
            }
            .hero .deficit {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-style: italic;
                font-size: 36.4px; /* 26 × 1.4 — trimmed */
                line-height: 1;
                color: var(--positive);
                letter-spacing: -0.015em;
                font-feature-settings: "tnum" 1, "lnum" 1;
                white-space: nowrap;
            }
            [data-theme="dark"] .hero .deficit {
                text-shadow:
                    0 0 32px color-mix(in srgb, var(--positive) 50%, transparent),
                    0 0 6px color-mix(in srgb, var(--positive) 33%, transparent);
            }

            /* --- Calorie multi-color bar --- */
            .calbar {
                width: 100%;
                height: 4.2px; /* 3 × 1.4 */
                border-radius: 2.8px;
                background: var(--track);
                overflow: hidden;
                position: relative;
            }
            .calbar > .fill {
                height: 100%;
                background: linear-gradient(
                    90deg,
                    var(--protein),
                    var(--carbs),
                    var(--fat)
                );
                border-radius: 2.8px;
            }
            .calbar > .tick {
                position: absolute;
                top: -2.8px;
                right: 0;
                width: 2.1px;
                height: 9.8px;
                background: var(--ink2);
                opacity: 0.5;
            }

            /* --- Macros 3-col grid --- */
            .macros {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 14px;
            }
            .macro {
                display: flex;
                flex-direction: column;
                padding-top: 8px;
                border-top: 1px solid var(--rule);
            }
            .macro .head {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 6px;
            }
            .macro .name {
                font-family:
                    -apple-system, "Helvetica Neue", sans-serif;
                font-size: 11.9px;
                font-weight: 600;
                letter-spacing: 0.18em;
                text-transform: uppercase;
            }
            .macro.protein .name {
                color: var(--protein);
            }
            .macro.carbs .name {
                color: var(--carbs);
            }
            .macro.fat .name {
                color: var(--fat);
            }
            .macro .pct {
                font-size: 13.3px; /* 9.5 × 1.4 */
                color: var(--ink3);
            }
            .macro .vals {
                display: flex;
                align-items: baseline;
                gap: 4px;
                margin-bottom: 7px;
            }
            .macro .cur {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 23.8px; /* 17 × 1.4 */
                color: var(--ink1);
                line-height: 1;
                letter-spacing: -0.005em;
            }
            .macro .slash {
                font-size: 13.3px;
                color: var(--ink3);
            }
            .macro .pbar {
                height: 4.2px;
                border-radius: 2.8px;
                background: var(--track);
                overflow: hidden;
            }
            .macro .pbar > i {
                display: block;
                height: 100%;
                border-radius: 2.8px;
            }
            .macro.protein .pbar > i {
                background: var(--protein);
            }
            .macro.carbs .pbar > i {
                background: var(--carbs);
            }
            .macro.fat .pbar > i {
                background: var(--fat);
            }
            [data-theme="dark"] .macro.protein .pbar > i {
                box-shadow:
                    0 0 10px color-mix(in srgb, var(--protein) 47%, transparent),
                    0 0 2px color-mix(in srgb, var(--protein) 60%, transparent);
            }
            [data-theme="dark"] .macro.carbs .pbar > i {
                box-shadow:
                    0 0 10px color-mix(in srgb, var(--carbs) 47%, transparent),
                    0 0 2px color-mix(in srgb, var(--carbs) 60%, transparent);
            }
            [data-theme="dark"] .macro.fat .pbar > i {
                box-shadow:
                    0 0 10px color-mix(in srgb, var(--fat) 47%, transparent),
                    0 0 2px color-mix(in srgb, var(--fat) 60%, transparent);
            }

            /* --- Forecast | Weight --- */
            .fcwt {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                align-items: start;
            }
            .forecast .frow {
                display: grid;
                grid-template-columns: auto 1fr;
                column-gap: 11px;
                align-items: baseline;
                margin-bottom: 5px;
            }
            .forecast .frow .kg {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 19.6px; /* 14 × 1.4 */
                color: var(--ink1);
                letter-spacing: -0.01em;
                line-height: 1;
            }
            .forecast .frow .kgunit {
                font-size: 12.6px;
                color: var(--ink3);
                margin-left: 2px;
            }
            .forecast .frow .rhs {
                justify-self: end;
                text-align: right;
                white-space: nowrap;
            }
            .forecast .frow .rhs .date {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-style: italic;
                font-size: 18.2px; /* 13 × 1.4 */
                letter-spacing: -0.01em;
                font-feature-settings: "tnum" 1;
            }
            .forecast .frow:nth-child(2) .rhs .date {
                color: var(--today);
            }
            .forecast .frow:nth-child(3) .rhs .date {
                color: var(--fat);
            }
            .forecast .frow .rhs .days {
                font-size: 13.3px;
                color: var(--ink3);
                margin-left: 6px;
                font-feature-settings: "tnum" 1;
            }
            .forecast .pace {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-style: italic;
                font-size: 11.9px;
                color: var(--ink3);
                margin-top: 6px;
                line-height: 1;
            }
            .forecast .eyebrow {
                margin-bottom: 7px;
            }

            .weight .whead {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 4px;
            }
            .weight .wsummary {
                font-size: 12.6px;
                color: var(--ink2);
                font-feature-settings: "tnum" 1;
            }
            .weight .wsummary .latest {
                color: var(--ink1);
                font-weight: 600;
                margin-right: 4px;
            }
            .weight .wsummary .delta {
                color: var(--positive);
                font-weight: 600;
            }
            .weight .sparkline {
                width: 100%;
                height: 42px; /* 30 × 1.4 — trimmed */
                display: block;
            }

            /* --- Week bar chart --- */
            .week {
                display: flex;
                flex-direction: column;
                gap: 11px;
            }
            .week .whead {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .week .whead .right {
                font-size: 13.3px;
                color: var(--ink2);
                font-feature-settings: "tnum" 1;
            }
            .week .whead .right .num {
                color: var(--ink1);
                font-weight: 600;
            }
            .week .bars {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 6px;
            }
            .week .col {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .week .col .dl {
                font-size: 11.9px;
                font-weight: 500;
                color: var(--ink3);
                letter-spacing: 0.16em;
                text-transform: uppercase;
                margin-bottom: 5px;
                line-height: 1;
            }
            .week .col.today .dl {
                color: var(--today);
                font-weight: 700;
            }
            .week .col .barbox {
                position: relative;
                width: 100%;
                height: 35px; /* 25 × 1.4 — further trimmed to fit footer */
                display: flex;
                align-items: flex-end;
                justify-content: center;
            }
            .week .col .bar {
                width: 58%;
                background: var(--positive);
                border-radius: 2.1px;
                opacity: 0.85;
            }
            .week .col.over .bar {
                background: var(--protein);
            }
            .week .col.today .bar {
                background: var(--today);
                opacity: 1;
            }
            [data-theme="dark"] .week .col.today .bar {
                box-shadow:
                    0 0 10px color-mix(in srgb, var(--today) 40%, transparent);
            }
            .week .col .target {
                position: absolute;
                left: 0;
                right: 0;
                border-top: 1px dashed var(--ink3);
                opacity: 0.5;
            }
            .week .col .val {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 16.8px; /* 12 × 1.4 — trimmed */
                color: var(--ink1);
                margin-top: 5px;
                line-height: 1;
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .week .col.today .val {
                font-weight: 500;
            }
            .week .col .delta {
                font-size: 10.5px;
                font-weight: 600;
                letter-spacing: 0.04em;
                color: var(--positive);
                margin-top: 3px;
                opacity: 0.78;
                font-feature-settings: "tnum" 1;
            }
            .week .col.today .delta {
                opacity: 1;
            }
            .week .col.over .delta {
                color: var(--protein);
            }

            /* --- Footer --- */
            .footer {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-top: auto;
            }
            .footer .l,
            .footer .r {
                font-size: 12.6px;
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .footer .l {
                letter-spacing: 0.02em;
                color: var(--ink3);
            }
            .footer .r {
                letter-spacing: 0.04em;
                color: var(--ink3);
            }
            .footer .steps {
                color: var(--carbs);
                font-weight: 600;
            }
            .footer .wkavg {
                color: var(--positive);
                font-weight: 600;
            }

            /* --- Insight --- */
            .insight {
                font-size: 14.7px;
                color: var(--ink2);
                line-height: 1.4;
                margin-top: 6px;
                margin-bottom: 0;
            }
        </style>
    </head>
    <body>
        <div class="stage">
            <div class="controls">
                <button type="button" data-theme-btn="light" aria-pressed="true">
                    Light
                </button>
                <button type="button" data-theme-btn="dark" aria-pressed="false">
                    Dark
                </button>
                <button
                    type="button"
                    data-palette-btn="sunset"
                    aria-pressed="true"
                >
                    Sunset
                </button>
                <button
                    type="button"
                    data-palette-btn="vault"
                    aria-pressed="false"
                >
                    Vault
                </button>
                <span class="meta" id="metaInfo"></span>
            </div>
            <div class="frame">
                <div id="widget" class="widget"></div>
            </div>
        </div>

        <script>
            // ---------- Sample payload (same shape as dashboard JSON) ----------
            const SAMPLE = {
                generated_at: new Date().toISOString(),
                timezone: "America/New_York",
                today: {
                    date: "2026-05-12",
                    meals_count: 3,
                    calories_in: 1450,
                    calories_out: 2400,
                    balance: -950,
                    eer: 2100,
                    step_calories_raw: 420,
                    step_calories_adjusted: 300,
                    step_calories_factor: 0.7,
                    steps: 8250,
                    macros: {
                        protein_g: { actual: 95, target_rda: 120 },
                        carbs_g: { actual: 145, target_rda: 290 },
                        fat_g: { actual: 52, target_min: 50, target_max: 78 },
                    },
                    targets_known: true,
                },
                week: {
                    days: 7,
                    avg_calories: 1866,
                    avg_balance: -360,
                    total_steps: 47800,
                    weight_kg_start: 119.4,
                    weight_kg_end: 118.6,
                    weight_kg_delta: -0.8,
                },
                week_strip: [
                    { date: "2026-05-06", weekday_short: "T", calories_in: 1810, balance: -590, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-07", weekday_short: "W", calories_in: 2280, balance: -120, meals_count: 4, is_today: false, is_selected: false },
                    { date: "2026-05-08", weekday_short: "T", calories_in: 1620, balance: -780, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-09", weekday_short: "F", calories_in: 2540, balance: 140, meals_count: 4, is_today: false, is_selected: false },
                    { date: "2026-05-10", weekday_short: "S", calories_in: 1950, balance: -450, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-11", weekday_short: "S", calories_in: 1410, balance: -990, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-12", weekday_short: "M", calories_in: 1450, balance: -950, meals_count: 3, is_today: true, is_selected: true },
                ],
                selected_date: "2026-05-12",
                insight: {
                    text: "Protein lagging — aim for a 30g+ source at dinner.",
                    generated_at: new Date().toISOString(),
                    cached: false,
                    unavailable_reason: null,
                },
                weight_graph: {
                    weeks: [
                        { week_start: "2026-03-17", min_weight_kg: 122.3 },
                        { week_start: "2026-03-24", min_weight_kg: 121.9 },
                        { week_start: "2026-03-31", min_weight_kg: 121.4 },
                        { week_start: "2026-04-07", min_weight_kg: 120.8 },
                        { week_start: "2026-04-14", min_weight_kg: 120.2 },
                        { week_start: "2026-04-21", min_weight_kg: 119.6 },
                        { week_start: "2026-04-28", min_weight_kg: 119.1 },
                        { week_start: "2026-05-05", min_weight_kg: 118.6 },
                    ],
                },
                weight_forecast: {
                    current_kg: 118.6,
                    slope_kg_per_week: -0.7,
                    method: "best_week",
                    weekly_deficit_kcal: -5390,
                    rationale: "at 0.70 kg/wk pace",
                    targets: [
                        { goal_kg: 115, reached: false, eta_days: 36, eta_date: "2026-06-17" },
                        { goal_kg: 110, reached: false, eta_days: 86, eta_date: "2026-08-06" },
                    ],
                },
                last_meal: { description: "lunch", meal_type: "lunch", logged_at: new Date(Date.now() - 2 * 3600 * 1000).toISOString(), relative: "2h ago" },
                profile: { exists: true, activity_level: "low_active" },
            };

            // ---------- Helpers ----------
            const params = new URLSearchParams(location.search);
            const fmtNum = (n) =>
                n == null || isNaN(n) ? "—" : Math.round(n).toLocaleString("en-US");
            const fmtSigned = (n) => {
                if (n == null || isNaN(n)) return "—";
                const r = Math.round(n);
                if (r === 0) return "0";
                // Use a minus sign (−, U+2212) for negative numbers — looks
                // properly typographic vs. the hyphen-minus.
                return r > 0 ? `+${r.toLocaleString("en-US")}` : `−${Math.abs(r).toLocaleString("en-US")}`;
            };
            const fmtShortDate = (iso) => {
                if (!iso) return "—";
                const d = new Date(iso + (iso.length === 10 ? "T00:00:00" : ""));
                return `${d.toLocaleString("en-US", { month: "short" })} ${String(d.getDate()).padStart(2, "0")}`;
            };
            const fmtWeekday = (iso) => {
                if (!iso) return "";
                const d = new Date(iso + (iso.length === 10 ? "T00:00:00" : ""));
                return d.toLocaleString("en-US", { weekday: "short" }).toUpperCase();
            };
            const fmtMonthDay = (iso) => {
                if (!iso) return "";
                const d = new Date(iso + (iso.length === 10 ? "T00:00:00" : ""));
                return `${d.toLocaleString("en-US", { month: "short" }).toUpperCase()} ${d.getDate()}`;
            };
            const el = (tag, cls, text) => {
                const e = document.createElement(tag);
                if (cls) e.className = cls;
                if (text != null) e.textContent = text;
                return e;
            };

            // ---------- Renderer ----------
            function render(data) {
                const w = document.getElementById("widget");
                w.innerHTML = "";

                // --- Header
                const h = el("div", "h");
                const todayWrap = el("div", "today");
                todayWrap.append(el("span", "dot"));
                todayWrap.append(el("span", "label", "Today"));
                h.append(todayWrap);
                h.append(
                    el(
                        "div",
                        "eyebrow",
                        `${fmtWeekday(data.today.date)} · ${fmtMonthDay(data.today.date)}`,
                    ),
                );
                w.append(h);

                // gap 3 + insight + gap 8 + rule + gap 7
                if (data.insight?.text) {
                    w.append(spacer(3));
                    w.append(el("div", "insight", data.insight.text));
                    w.append(spacer(8));
                }
                w.append(el("div", "rule"));
                w.append(spacer(7));

                // --- Hero
                const t = data.today;
                const target = t.calories_out || t.eer || 0;
                const hero = el("div", "hero");
                const left = el("div", "left");
                left.append(el("div", "eyebrow", "CONSUMED · KCAL"));
                left.append(el("div", "num tnum", fmtNum(t.calories_in)));
                if (target > 0) {
                    left.append(
                        el("div", "target tnum", `of ${fmtNum(target)} target`),
                    );
                }
                hero.append(left);
                const right = el("div", "right");
                const isDeficit = t.balance < 0;
                const balLabel = isDeficit
                    ? "DEFICIT"
                    : t.balance > 0
                      ? "SURPLUS"
                      : "BALANCED";
                right.append(
                    el("div", isDeficit ? "eyebrow deficit-eb" : "eyebrow", balLabel),
                );
                right.append(
                    el(
                        "div",
                        "deficit tnum",
                        t.balance === 0
                            ? "0"
                            : t.balance < 0
                              ? `−${Math.abs(t.balance).toLocaleString("en-US")}`
                              : `+${t.balance.toLocaleString("en-US")}`,
                    ),
                );
                hero.append(right);
                w.append(hero);

                // gap 7 + calorie gradient bar
                w.append(spacer(7));
                const calbar = el("div", "calbar");
                const fill = el("div", "fill");
                const fr = target > 0 ? Math.max(0, Math.min(1, t.calories_in / target)) : 0;
                fill.style.width = `${fr * 100}%`;
                calbar.append(fill);
                calbar.append(el("div", "tick"));
                w.append(calbar);

                // gap 8 + macros + gap 8 + rule + gap 6
                w.append(spacer(8));
                const macros = el("div", "macros");
                macros.append(
                    macroCol("P", "protein", t.macros.protein_g.actual, t.macros.protein_g.target_rda),
                );
                macros.append(
                    macroCol("C", "carbs", t.macros.carbs_g.actual, t.macros.carbs_g.target_rda),
                );
                const fatTarget =
                    t.macros.fat_g.target_min && t.macros.fat_g.target_max
                        ? (t.macros.fat_g.target_min + t.macros.fat_g.target_max) / 2
                        : null;
                macros.append(macroCol("F", "fat", t.macros.fat_g.actual, fatTarget));
                w.append(macros);
                w.append(spacer(8));
                w.append(el("div", "rule"));
                w.append(spacer(6));

                // --- Forecast | Weight
                const fcwt = el("div", "fcwt");
                fcwt.append(renderForecast(data));
                fcwt.append(renderWeight(data));
                w.append(fcwt);

                // gap 7 + rule + gap 6
                w.append(spacer(7));
                w.append(el("div", "rule"));
                w.append(spacer(6));

                // --- Week bar chart
                w.append(renderWeekBars(data, target));

                // flex spacer + soft rule + gap 8 + footer
                w.append(el("div", "spacer", null));
                w.append(spacer(10));
                w.append(el("div", "rule-soft"));
                w.append(spacer(8));
                w.append(renderFooter(data));
            }

            function spacer(h) {
                const s = el("div");
                s.style.height = `${h * 1.4}px`;
                s.style.flexShrink = "0";
                return s;
            }

            function macroCol(letter, kind, actual, target) {
                const col = el("div", `macro ${kind}`);
                const head = el("div", "head");
                head.append(el("div", "name", letter));
                const pct =
                    target && target > 0 ? Math.round((actual / target) * 100) : null;
                head.append(el("div", "pct", pct != null ? `${pct}%` : ""));
                col.append(head);
                const vals = el("div", "vals");
                vals.append(el("span", "cur tnum", Math.round(actual)));
                if (target != null)
                    vals.append(el("span", "slash tnum", `/${Math.round(target)}g`));
                else vals.append(el("span", "slash", "g"));
                col.append(vals);
                const pbar = el("div", "pbar");
                const i = el("i");
                const fr = target ? Math.max(0, Math.min(1, actual / target)) : 0;
                i.style.width = `${fr * 100}%`;
                pbar.append(i);
                col.append(pbar);
                return col;
            }

            function renderForecast(data) {
                const f = data.weight_forecast ?? { targets: [], rationale: "" };
                const wrap = el("div", "forecast");
                wrap.append(el("div", "eyebrow", "FORECAST"));
                const targets = f.targets ?? [];
                for (const t of targets) {
                    const row = el("div", "frow");
                    const left = el("div");
                    const kgSpan = el("span", "kg tnum", `${t.goal_kg}`);
                    left.append(kgSpan);
                    left.append(el("span", "kgunit", "kg"));
                    row.append(left);
                    const rhs = el("div", "rhs");
                    if (t.reached) {
                        rhs.append(el("span", "date", "reached"));
                    } else if (t.eta_date && t.eta_days != null) {
                        rhs.append(el("span", "date", fmtShortDate(t.eta_date)));
                        rhs.append(el("span", "days", `· ${t.eta_days}d`));
                    } else {
                        rhs.append(el("span", "days", "awaiting data"));
                    }
                    row.append(rhs);
                    wrap.append(row);
                }
                if (f.rationale) {
                    wrap.append(el("div", "pace", f.rationale));
                }
                return wrap;
            }

            function renderWeight(data) {
                const wrap = el("div", "weight");
                const weeks = data.weight_graph?.weeks ?? [];
                const filled = weeks.filter((w) => w.min_weight_kg != null);
                const head = el("div", "whead");
                head.append(el("div", "eyebrow", "WEIGHT"));
                const summary = el("div", "wsummary tnum");
                if (filled.length) {
                    const latest = filled[filled.length - 1].min_weight_kg;
                    summary.append(el("span", "latest", latest.toFixed(1)));
                    if (filled.length >= 2) {
                        const delta =
                            latest - filled[0].min_weight_kg;
                        summary.append(
                            el(
                                "span",
                                "delta",
                                `${delta < 0 ? "−" : delta > 0 ? "+" : ""}${Math.abs(delta).toFixed(1)}`,
                            ),
                        );
                    }
                }
                head.append(summary);
                wrap.append(head);
                wrap.append(spacer(3));
                wrap.append(renderSparkline(weeks));
                return wrap;
            }

            function renderSparkline(weeks) {
                const svg = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "svg",
                );
                svg.setAttribute("class", "sparkline");
                svg.setAttribute("viewBox", "0 0 196 59");
                svg.setAttribute("preserveAspectRatio", "none");
                const points = weeks
                    .map((w, i) => ({ i, v: w.min_weight_kg }))
                    .filter((p) => p.v != null);
                if (points.length < 2) return svg;
                const padTop = 4,
                    padBottom = 6,
                    padLeft = 2,
                    padRight = 4;
                const w = 196,
                    h = 59;
                const values = points.map((p) => p.v);
                const minV = Math.min(...values) - 0.5;
                const maxV = Math.max(...values) + 0.3;
                const range = Math.max(0.5, maxV - minV);
                const xFor = (i) =>
                    padLeft + (i / Math.max(1, weeks.length - 1)) * (w - padLeft - padRight);
                const yFor = (v) =>
                    padTop + (h - padTop - padBottom) - ((v - minV) / range) * (h - padTop - padBottom);

                // Area fill: positive gradient
                const grad = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "linearGradient",
                );
                grad.setAttribute("id", "spark-area");
                grad.setAttribute("x1", "0");
                grad.setAttribute("x2", "0");
                grad.setAttribute("y1", "0");
                grad.setAttribute("y2", "1");
                const s1 = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "stop",
                );
                s1.setAttribute("offset", "0%");
                s1.setAttribute("stop-color", "var(--positive)");
                s1.setAttribute("stop-opacity", "0.25");
                const s2 = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "stop",
                );
                s2.setAttribute("offset", "100%");
                s2.setAttribute("stop-color", "var(--positive)");
                s2.setAttribute("stop-opacity", "0");
                grad.append(s1, s2);
                const defs = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "defs",
                );
                defs.append(grad);
                svg.append(defs);

                // Target hairline at 86% of plot height
                const tgY = padTop + (h - padTop - padBottom) * 0.86;
                const tline = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "line",
                );
                tline.setAttribute("x1", padLeft);
                tline.setAttribute("x2", w - padRight);
                tline.setAttribute("y1", tgY);
                tline.setAttribute("y2", tgY);
                tline.setAttribute("stroke", "var(--ink3)");
                tline.setAttribute("stroke-width", "1");
                tline.setAttribute("stroke-dasharray", "3 3");
                tline.setAttribute("opacity", "0.65");
                svg.append(tline);

                // Area
                let areaD = "";
                points.forEach((p, i) => {
                    const x = xFor(weeks.indexOf(weeks.find((wk) => wk.min_weight_kg === p.v && weeks.indexOf(wk) === p.i)) || p.i);
                    const y = yFor(p.v);
                    areaD += `${i === 0 ? "M" : "L"}${x},${y} `;
                });
                const lastX = xFor(points[points.length - 1].i);
                const firstX = xFor(points[0].i);
                areaD += `L${lastX},${h - padBottom} L${firstX},${h - padBottom} Z`;
                const area = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "path",
                );
                area.setAttribute("d", areaD);
                area.setAttribute("fill", "url(#spark-area)");
                svg.append(area);

                // Line
                let lineD = "";
                points.forEach((p, i) => {
                    const x = xFor(p.i);
                    const y = yFor(p.v);
                    lineD += `${i === 0 ? "M" : "L"}${x},${y} `;
                });
                const line = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "path",
                );
                line.setAttribute("d", lineD);
                line.setAttribute("fill", "none");
                line.setAttribute("stroke", "var(--chartLine)");
                line.setAttribute("stroke-width", "1.2");
                line.setAttribute("stroke-linecap", "round");
                line.setAttribute("stroke-linejoin", "round");
                svg.append(line);

                // Dots
                points.forEach((p, idx) => {
                    const x = xFor(p.i);
                    const y = yFor(p.v);
                    const isLast = idx === points.length - 1;
                    if (isLast) {
                        const halo = document.createElementNS(
                            "http://www.w3.org/2000/svg",
                            "circle",
                        );
                        halo.setAttribute("cx", x);
                        halo.setAttribute("cy", y);
                        halo.setAttribute("r", "4");
                        halo.setAttribute("fill", "var(--positive)");
                        halo.setAttribute("opacity", "0.18");
                        svg.append(halo);
                    }
                    const c = document.createElementNS(
                        "http://www.w3.org/2000/svg",
                        "circle",
                    );
                    c.setAttribute("cx", x);
                    c.setAttribute("cy", y);
                    c.setAttribute("r", isLast ? 2.2 : 1.8);
                    c.setAttribute(
                        "fill",
                        isLast ? "var(--positive)" : "var(--chartLine)",
                    );
                    svg.append(c);
                });

                return svg;
            }

            function renderWeekBars(data, target) {
                const wrap = el("div", "week");
                const head = el("div", "whead");
                head.append(el("div", "eyebrow", "WEEK · KCAL"));
                const avg = data.week.avg_calories;
                const rightTxt = el("div", "right tnum");
                rightTxt.innerHTML = `<span>avg </span><span class="num">${fmtNum(avg)}</span><span> · target ${fmtNum(target)}</span>`;
                head.append(rightTxt);
                wrap.append(head);

                const cells = data.week_strip ?? [];
                const values = cells.map((c) => c.calories_in);
                const max = Math.max(target * 1.1, ...values);
                const bars = el("div", "bars");
                cells.forEach((c) => {
                    const col = el("div", "col");
                    if (c.is_today) col.classList.add("today");
                    if (c.calories_in > target) col.classList.add("over");
                    col.append(el("div", "dl", c.weekday_short));
                    const box = el("div", "barbox");
                    // Target dashed line at y = (1 - target/max)
                    const tgt = el("div", "target");
                    tgt.style.bottom = `${(target / max) * 100}%`;
                    box.append(tgt);
                    const bar = el("div", "bar");
                    bar.style.height = `${(c.calories_in / max) * 100}%`;
                    box.append(bar);
                    col.append(box);
                    // Values + deltas dropped from bar columns — the target
                    // hairline + bar colors (over=protein, today=today) carry
                    // the meaning visually. The bigger context is in the
                    // header row ("avg 1,866 · target 2,400"). Saves the
                    // ~30px we needed to fit the footer.
                    bars.append(col);
                });
                wrap.append(bars);
                return wrap;
            }

            function renderFooter(data) {
                const row = el("div", "footer");
                const left = el("div", "l");
                left.innerHTML = `<span class="steps">${fmtNum(data.today.steps)}</span><span> steps · wk </span><span class="wkavg">${fmtSigned(data.week.avg_balance)}</span><span>/d</span>`;
                row.append(left);
                row.append(el("div", "r", "10:10 PM"));
                return row;
            }

            // ---------- Theme + palette controls ----------
            const initialTheme = params.get("theme") === "dark" ? "dark" : "light";
            const initialPalette = params.get("palette") === "vault" ? "vault" : "sunset";
            document.documentElement.setAttribute("data-theme", initialTheme);
            document.documentElement.setAttribute("data-palette", initialPalette);
            function syncButtons() {
                const cur = document.documentElement.getAttribute("data-theme");
                const pal = document.documentElement.getAttribute("data-palette");
                document.querySelectorAll("[data-theme-btn]").forEach((b) => {
                    b.setAttribute(
                        "aria-pressed",
                        b.dataset.themeBtn === cur ? "true" : "false",
                    );
                });
                document.querySelectorAll("[data-palette-btn]").forEach((b) => {
                    b.setAttribute(
                        "aria-pressed",
                        b.dataset.paletteBtn === pal ? "true" : "false",
                    );
                });
            }
            syncButtons();
            document.querySelectorAll("[data-theme-btn]").forEach((b) => {
                b.addEventListener("click", () => {
                    document.documentElement.setAttribute("data-theme", b.dataset.themeBtn);
                    syncButtons();
                });
            });
            document.querySelectorAll("[data-palette-btn]").forEach((b) => {
                b.addEventListener("click", () => {
                    document.documentElement.setAttribute("data-palette", b.dataset.paletteBtn);
                    syncButtons();
                });
            });

            // ---------- Data load ----------
            async function load() {
                const meta = document.getElementById("metaInfo");
                const token = params.get("token");
                const date = params.get("date");
                if (!token) {
                    meta.textContent = "sample data — append ?token=… for real";
                    render(SAMPLE);
                    return;
                }
                meta.textContent = "loading real data…";
                const url = date
                    ? `/dashboard/nutrition?date=${encodeURIComponent(date)}`
                    : `/dashboard/nutrition`;
                try {
                    const r = await fetch(url, {
                        headers: { Authorization: `Bearer ${token}` },
                    });
                    if (!r.ok) {
                        const t = await r.text();
                        throw new Error(`${r.status}: ${t.slice(0, 120)}`);
                    }
                    const data = await r.json();
                    meta.textContent = `live · selected ${data.selected_date}`;
                    render(data);
                } catch (err) {
                    meta.textContent = `error — falling back to sample: ${err.message}`;
                    render(SAMPLE);
                }
            }
            load();
        </script>
    </body>
</html>
