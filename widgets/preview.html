<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="robots" content="noindex" />
        <title>Nutrition Widget — Preview</title>
        <!--
            Faithful port of the React reference from Claude Design (see the
            handoff at ~/Downloads/handoff.md + the WidgetVivid component the
            owner pasted in). Rendered at the same logical 338 × 354 point
            size as the iPhone Large widget so visual fidelity matches what
            ships to Scriptable; a single CSS transform on the frame scales
            it up for screenshots without distorting any internal proportions.

            URL params:
              ?theme=dark            force dark
              ?palette=vault         switch to vault palette
              ?token=…&date=…        fetch real data instead of sample
              ?zoom=1.0|1.5|2.0      override the display zoom (default 1.5)
        -->
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <style>
            :root,
            [data-palette="sunset"][data-theme="light"] {
                --page: #efe6d2;
                --card: #fbf5e6;
                --ink1: #1f140c;
                --ink2: #6a5945;
                --ink3: #a89878;
                --ink4: #d1c3a4;
                --rule: rgba(31, 20, 12, 0.1);
                --rule-soft: rgba(31, 20, 12, 0.06);
                --track: rgba(31, 20, 12, 0.08);
                --protein: #e04e2a;
                --carbs: #e0a21a;
                --fat: #7a52d0;
                --positive: #1e8e5c;
                --today: #d6336e;
                --chartLine: #1f140c;
                --shadow: 0 1px 0 rgba(0, 0, 0, 0.04),
                    0 24px 48px -28px rgba(0, 0, 0, 0.25);
            }
            [data-palette="sunset"][data-theme="dark"] {
                --page: #0b0805;
                --card: #1a130c;
                --ink1: #f2e9d5;
                --ink2: #9a8b74;
                --ink3: #5c5040;
                --ink4: #332b22;
                --rule: rgba(242, 233, 213, 0.12);
                --rule-soft: rgba(242, 233, 213, 0.06);
                --track: rgba(242, 233, 213, 0.1);
                --protein: #ff6f4a;
                --carbs: #f5be3e;
                --fat: #a487f6;
                --positive: #5cd89e;
                --today: #ff5b85;
                --chartLine: #f2e9d5;
                --shadow:
                    0 0 0 0.5px rgba(255, 255, 255, 0.04),
                    0 24px 60px -24px rgba(0, 0, 0, 0.8);
            }
            [data-palette="vault"][data-theme="light"] {
                --page: #e8e8ec;
                --card: #f6f6f8;
                --ink1: #0b0f18;
                --ink2: #5a6072;
                --ink3: #9097a8;
                --ink4: #bfc4d2;
                --rule: rgba(11, 15, 24, 0.1);
                --rule-soft: rgba(11, 15, 24, 0.06);
                --track: rgba(11, 15, 24, 0.08);
                --protein: #e5006a;
                --carbs: #ffb400;
                --fat: #1466ff;
                --positive: #00a86b;
                --today: #ff2e63;
                --chartLine: #0b0f18;
                --shadow: 0 1px 0 rgba(0, 0, 0, 0.04),
                    0 24px 48px -28px rgba(0, 0, 0, 0.25);
            }
            [data-palette="vault"][data-theme="dark"] {
                --page: #000000;
                --card: #0a0b0f;
                --ink1: #f5f7fb;
                --ink2: #aab3ca;
                --ink3: #737c90;
                --ink4: #2e3447;
                --rule: rgba(245, 247, 251, 0.18);
                --rule-soft: rgba(245, 247, 251, 0.08);
                --track: rgba(245, 247, 251, 0.14);
                --protein: #ff4d90;
                --carbs: #ffd850;
                --fat: #6d9aff;
                --positive: #5cf5a8;
                --today: #ff6680;
                --chartLine: #f5f7fb;
                --shadow:
                    0 0 0 0.5px rgba(255, 255, 255, 0.04),
                    0 24px 60px -24px rgba(0, 0, 0, 0.8);
            }

            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
                background: var(--page);
                color-scheme: light dark;
                font-family:
                    "Helvetica Neue", Helvetica, -apple-system, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .stage {
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 16px;
                flex-direction: column;
                gap: 22px;
            }
            .controls {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
                font-size: 12px;
                color: var(--ink2);
            }
            .controls button {
                font: inherit;
                border: 1px solid color-mix(in srgb, var(--ink1) 20%, transparent);
                background: color-mix(in srgb, var(--card) 70%, transparent);
                color: var(--ink1);
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
            }
            .controls button[aria-pressed="true"] {
                background: var(--ink1);
                color: var(--card);
                border-color: var(--ink1);
            }

            /*
             * The widget renders at its actual logical size (338 × 354 pt = px
             * in CSS). A CSS scale on the *.zoom* wrapper magnifies it for
             * display/screenshots without affecting any internal proportions —
             * everything inside is at the same point size the iPhone uses.
             */
            .zoom {
                transform: scale(var(--zoom, 1.5));
                transform-origin: center;
            }
            .frame {
                background: var(--page);
                padding: 26px;
                border-radius: 44px;
                width: max-content;
            }
            .widget {
                width: 338px;
                height: 354px;
                background: var(--card);
                color: var(--ink1);
                border-radius: 30px;
                padding: 18px 20px 16px;
                box-shadow: var(--shadow);
                display: flex;
                flex-direction: column;
                position: relative;
                overflow: hidden;
            }

            /* === Type primitives === */
            .serif {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-weight: 400;
            }
            .italic {
                font-style: italic;
            }
            .eyebrow {
                font-size: 8.5px;
                font-weight: 600;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                line-height: 1;
                color: var(--ink3);
            }
            .insight {
                font-size: 10.5px;
                color: var(--ink2);
                line-height: 1.4;
            }
            .rule {
                height: 1px;
                background: var(--rule);
            }
            .rule-soft {
                height: 1px;
                background: var(--rule-soft);
            }

            /* === Header === */
            .h {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .h .left {
                display: flex;
                align-items: baseline;
                gap: 8px;
            }
            .h .today-label {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-style: italic;
                font-size: 17px;
                line-height: 1;
                letter-spacing: -0.01em;
                color: var(--ink1);
            }
            .h .today-dot {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--today);
                transform: translateY(-2px);
                box-shadow: 0 0 0 3px color-mix(in srgb, var(--today) 18%, transparent);
            }

            /* === Hero === */
            .hero {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                gap: 12px;
            }
            .hero .left {
                min-width: 0;
            }
            .hero .num {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 42px;
                line-height: 0.92;
                letter-spacing: -0.025em;
                font-weight: 400;
                white-space: nowrap;
                color: var(--ink1);
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .hero .target {
                font-size: 10px;
                color: var(--ink3);
                letter-spacing: 0.02em;
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .hero .right {
                text-align: right;
                padding-bottom: 2px;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
            }
            .hero .deficit {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-style: italic;
                font-size: 30px;
                line-height: 1;
                color: var(--positive);
                letter-spacing: -0.015em;
                white-space: nowrap;
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            [data-theme="dark"] .hero .deficit {
                text-shadow:
                    0 0 32px color-mix(in srgb, var(--positive) 50%, transparent),
                    0 0 6px color-mix(in srgb, var(--positive) 33%, transparent);
            }

            /* === Calorie multi-color bar === */
            .calbar {
                position: relative;
                height: 3px;
                background: var(--track);
                border-radius: 2px;
                overflow: visible;
            }
            .calbar > .fill {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                background: linear-gradient(
                    90deg,
                    var(--protein),
                    var(--carbs),
                    var(--fat)
                );
                border-radius: 2px;
            }
            .calbar > .tick {
                position: absolute;
                right: 0;
                top: -2px;
                bottom: -2px;
                width: 1.5px;
                background: var(--ink2);
                opacity: 0.5;
            }

            /* === Macros (3-col ledger) === */
            .macros {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
            }
            .macro {
                padding-top: 6px;
                border-top: 1px solid var(--rule);
            }
            .macro .head {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .macro .name {
                font-size: 8.5px;
                font-weight: 600;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                line-height: 1;
            }
            .macro.protein .name {
                color: var(--protein);
            }
            .macro.carbs .name {
                color: var(--carbs);
            }
            .macro.fat .name {
                color: var(--fat);
            }
            .macro .pct {
                font-size: 9.5px;
                color: var(--ink3);
                font-feature-settings: "tnum" 1;
            }
            .macro .vals {
                margin-top: 4px;
            }
            .macro .cur {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 17px;
                line-height: 1;
                letter-spacing: -0.01em;
                color: var(--ink1);
            }
            .macro .slash {
                font-size: 9.5px;
                color: var(--ink3);
                margin-left: 2px;
            }
            .macro .pbar {
                margin-top: 5px;
                position: relative;
                height: 3px;
                background: var(--track);
                border-radius: 2px;
            }
            .macro .pbar > i {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                border-radius: 2px;
            }
            .macro.protein .pbar > i {
                background: var(--protein);
            }
            .macro.carbs .pbar > i {
                background: var(--carbs);
            }
            .macro.fat .pbar > i {
                background: var(--fat);
            }
            [data-theme="dark"] .macro.protein .pbar > i {
                box-shadow:
                    0 0 10px color-mix(in srgb, var(--protein) 47%, transparent),
                    0 0 2px color-mix(in srgb, var(--protein) 60%, transparent);
            }
            [data-theme="dark"] .macro.carbs .pbar > i {
                box-shadow:
                    0 0 10px color-mix(in srgb, var(--carbs) 47%, transparent),
                    0 0 2px color-mix(in srgb, var(--carbs) 60%, transparent);
            }
            [data-theme="dark"] .macro.fat .pbar > i {
                box-shadow:
                    0 0 10px color-mix(in srgb, var(--fat) 47%, transparent),
                    0 0 2px color-mix(in srgb, var(--fat) 60%, transparent);
            }

            /* === Forecast | Weight === */
            .fcwt {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
                align-items: start;
            }
            .forecast .frow {
                display: grid;
                grid-template-columns: auto 1fr;
                column-gap: 8px;
                align-items: baseline;
                margin-bottom: 3px;
            }
            .forecast .frow .kg {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 14px;
                letter-spacing: -0.01em;
                white-space: nowrap;
                color: var(--ink1);
            }
            .forecast .frow .kgunit {
                font-size: 9px;
                color: var(--ink3);
                margin-left: 1px;
            }
            .forecast .frow .rhs {
                text-align: right;
                white-space: nowrap;
            }
            .forecast .frow:nth-of-type(2) .rhs .date {
                color: var(--today);
            }
            .forecast .frow:nth-of-type(3) .rhs .date {
                color: var(--fat);
            }
            .forecast .frow .rhs .date {
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 13px;
                font-style: italic;
                letter-spacing: -0.005em;
            }
            .forecast .frow .rhs .days {
                color: var(--ink3);
                margin-left: 4px;
                font-size: 9.5px;
                letter-spacing: 0.02em;
                font-feature-settings: "tnum" 1;
            }
            .forecast .pace {
                margin-top: 4px;
                font-size: 8.5px;
                color: var(--ink3);
                letter-spacing: 0.04em;
                font-style: italic;
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
            }

            .weight .whead {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .weight .wsum {
                font-size: 9px;
                color: var(--ink2);
                font-feature-settings: "tnum" 1;
            }
            .weight .wsum .latest {
                color: var(--ink1);
            }
            .weight .wsum .delta {
                color: var(--positive);
                font-weight: 600;
            }
            .weight .sparkline {
                margin-top: 3px;
                width: 140px;
                height: 42px;
                display: block;
            }

            /* === Week ledger (bar chart) === */
            .week .whead {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .week .whead .right {
                font-size: 9.5px;
                color: var(--ink2);
                font-feature-settings: "tnum" 1;
                letter-spacing: 0.02em;
            }
            .week .whead .right .avg-num {
                color: var(--ink1);
                font-weight: 600;
            }
            .week .whead .right .muted {
                color: var(--ink3);
            }
            .week .bars {
                margin-top: 8px;
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
            }
            .week .col {
                text-align: center;
                position: relative;
            }
            .week .col .dl {
                font-size: 8.5px;
                letter-spacing: 0.16em;
                color: var(--ink3);
                font-weight: 500;
                text-transform: uppercase;
            }
            .week .col.today .dl {
                color: var(--today);
                font-weight: 700;
            }
            .week .col .barbox {
                position: relative;
                height: 42px;
                margin-top: 5px;
                display: flex;
                align-items: flex-end;
                justify-content: center;
            }
            .week .col .target-line {
                position: absolute;
                left: 0;
                right: 0;
                height: 1px;
                background-image: linear-gradient(to right, var(--ink3) 50%, transparent 50%);
                background-size: 3px 1px;
                background-repeat: repeat-x;
                opacity: 0.5;
            }
            .week .col .bar {
                width: 58%;
                background: var(--positive);
                border-radius: 1.5px;
                opacity: 0.85;
            }
            .week .col.over .bar {
                background: var(--protein);
            }
            .week .col.today .bar {
                background: var(--today);
                opacity: 1;
            }
            [data-theme="dark"] .week .col.today .bar {
                box-shadow: 0 0 10px color-mix(in srgb, var(--today) 40%, transparent);
            }
            .week .col .val {
                margin-top: 5px;
                font-family:
                    "Instrument Serif", "Times New Roman", Georgia, serif;
                font-size: 13.5px;
                letter-spacing: -0.005em;
                line-height: 1;
                color: var(--ink2);
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .week .col.today .val {
                color: var(--ink1);
                font-weight: 500;
            }
            .week .col .delta {
                margin-top: 3px;
                font-size: 8.5px;
                font-weight: 600;
                letter-spacing: 0.04em;
                color: var(--positive);
                font-feature-settings: "tnum" 1;
                opacity: 0.78;
            }
            .week .col.today .delta {
                opacity: 1;
            }
            .week .col.over .delta {
                color: var(--protein);
            }

            /* === Footer === */
            .footer {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                font-size: 9px;
                font-feature-settings: "tnum" 1, "lnum" 1;
            }
            .footer .l {
                letter-spacing: 0.02em;
                color: var(--ink2);
            }
            .footer .l .steps {
                color: var(--carbs);
                font-weight: 600;
            }
            .footer .l .muted {
                color: var(--ink3);
            }
            .footer .l .wkavg {
                color: var(--positive);
                font-weight: 600;
            }
            .footer .r {
                color: var(--ink3);
                letter-spacing: 0.04em;
            }

            /* === Vertical rhythm shorthand === */
            .gap-4 { height: 4px; }
            .gap-5 { height: 5px; }
            .gap-8 { height: 8px; }
            .gap-9 { height: 9px; }
            .gap-10 { height: 10px; }
            .gap-11 { height: 11px; }
            .gap-12 { height: 12px; }
            .flex-spacer { flex: 1; min-height: 10px; }
        </style>
    </head>
    <body>
        <div class="stage">
            <div class="controls">
                <button type="button" data-theme-btn="light" aria-pressed="true">Light</button>
                <button type="button" data-theme-btn="dark" aria-pressed="false">Dark</button>
                <button type="button" data-palette-btn="sunset" aria-pressed="true">Sunset</button>
                <button type="button" data-palette-btn="vault" aria-pressed="false">Vault</button>
                <span class="meta" id="metaInfo"></span>
            </div>
            <div class="zoom">
                <div class="frame">
                    <div id="widget" class="widget"></div>
                </div>
            </div>
        </div>

        <script>
            const SAMPLE = {
                generated_at: new Date().toISOString(),
                timezone: "America/New_York",
                today: {
                    date: "2026-05-12",
                    meals_count: 3,
                    calories_in: 1450,
                    calories_out: 2400,
                    balance: -950,
                    eer: 2100,
                    step_calories_raw: 420,
                    step_calories_adjusted: 300,
                    step_calories_factor: 0.7,
                    steps: 8250,
                    macros: {
                        protein_g: { actual: 95, target_rda: 120 },
                        carbs_g: { actual: 145, target_rda: 290 },
                        fat_g: { actual: 52, target_min: 50, target_max: 78 },
                    },
                    targets_known: true,
                },
                week: {
                    days: 7,
                    avg_calories: 1866,
                    avg_balance: -360,
                    total_steps: 47800,
                    weight_kg_start: 119.4,
                    weight_kg_end: 118.6,
                    weight_kg_delta: -0.8,
                },
                week_strip: [
                    { date: "2026-05-06", weekday_short: "T", calories_in: 1810, balance: -590, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-07", weekday_short: "W", calories_in: 2280, balance: -120, meals_count: 4, is_today: false, is_selected: false },
                    { date: "2026-05-08", weekday_short: "T", calories_in: 1620, balance: -780, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-09", weekday_short: "F", calories_in: 2540, balance: 140, meals_count: 4, is_today: false, is_selected: false },
                    { date: "2026-05-10", weekday_short: "S", calories_in: 1950, balance: -450, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-11", weekday_short: "S", calories_in: 1410, balance: -990, meals_count: 3, is_today: false, is_selected: false },
                    { date: "2026-05-12", weekday_short: "M", calories_in: 1450, balance: -950, meals_count: 3, is_today: true, is_selected: true },
                ],
                selected_date: "2026-05-12",
                insight: {
                    text: "Protein lagging — aim for a 30g+ source at dinner.",
                    generated_at: new Date().toISOString(),
                    cached: false,
                    unavailable_reason: null,
                },
                weight_graph: {
                    weeks: [
                        { week_start: "2026-03-17", min_weight_kg: 122.3 },
                        { week_start: "2026-03-24", min_weight_kg: 121.9 },
                        { week_start: "2026-03-31", min_weight_kg: 121.4 },
                        { week_start: "2026-04-07", min_weight_kg: 120.8 },
                        { week_start: "2026-04-14", min_weight_kg: 120.2 },
                        { week_start: "2026-04-21", min_weight_kg: 119.6 },
                        { week_start: "2026-04-28", min_weight_kg: 119.1 },
                        { week_start: "2026-05-05", min_weight_kg: 118.6 },
                    ],
                },
                weight_forecast: {
                    current_kg: 118.6,
                    slope_kg_per_week: -0.7,
                    method: "best_week",
                    weekly_deficit_kcal: -5390,
                    rationale: "at 0.70 kg/wk pace",
                    targets: [
                        { goal_kg: 115, reached: false, eta_days: 36, eta_date: "2026-06-17" },
                        { goal_kg: 110, reached: false, eta_days: 86, eta_date: "2026-08-06" },
                    ],
                },
                last_meal: { description: "lunch", meal_type: "lunch", logged_at: new Date(Date.now() - 2 * 3600 * 1000).toISOString(), relative: "2h ago" },
                profile: { exists: true, activity_level: "low_active" },
            };

            const params = new URLSearchParams(location.search);
            const fmt = (n) =>
                n == null || isNaN(n) ? "—" : Math.round(n).toLocaleString("en-US");
            const fmtMonthDay = (iso) => {
                if (!iso) return "";
                const d = new Date(iso + (iso.length === 10 ? "T00:00:00" : ""));
                return `${d.toLocaleString("en-US", { month: "short" })} ${d.getDate()}`;
            };
            const fmtWeekday = (iso) => {
                if (!iso) return "";
                const d = new Date(iso + (iso.length === 10 ? "T00:00:00" : ""));
                return d.toLocaleString("en-US", { weekday: "short" });
            };

            const el = (tag, cls, text) => {
                const e = document.createElement(tag);
                if (cls) e.className = cls;
                if (text != null) e.textContent = text;
                return e;
            };
            const gap = (h) => {
                const e = document.createElement("div");
                e.className = `gap-${h}`;
                if (!e.classList.length) e.style.height = `${h}px`;
                return e;
            };

            function render(data) {
                const w = document.getElementById("widget");
                w.innerHTML = "";

                // ===== HEADER =====
                const h = el("div", "h");
                const left = el("div", "left");
                const lbl = el("div", "today-label", "Today");
                const dot = el("div", "today-dot");
                left.append(lbl, dot);
                h.append(left);
                h.append(
                    el(
                        "div",
                        "eyebrow",
                        `${fmtWeekday(data.today.date)} · ${fmtMonthDay(data.today.date)}`,
                    ),
                );
                w.append(h);
                w.append(gap(4));

                // ===== INSIGHT =====
                if (data.insight?.text) {
                    w.append(el("div", "insight", data.insight.text));
                }
                w.append(gap(10));
                w.append(el("div", "rule"));
                w.append(gap(9));

                // ===== HERO =====
                const t = data.today;
                const target = t.calories_out || t.eer || 0;
                const hero = el("div", "hero");
                const heroLeft = el("div", "left");
                heroLeft.append(el("div", "eyebrow", spaceCaps("Consumed · kcal")));
                heroLeft.append(gap(2));
                heroLeft.append(el("div", "num", fmt(t.calories_in)));
                heroLeft.append(gap(2));
                if (target > 0) {
                    heroLeft.append(el("div", "target", `of ${fmt(target)} target`));
                }
                hero.append(heroLeft);
                if (target > 0) {
                    const heroRight = el("div", "right");
                    const isDeficit = t.balance < 0;
                    const balLabel = isDeficit
                        ? "Deficit"
                        : t.balance > 0
                          ? "Surplus"
                          : "Balanced";
                    const eb = el("div", "eyebrow", spaceCaps(balLabel));
                    eb.style.color = isDeficit
                        ? "var(--positive)"
                        : t.balance > 0
                          ? "var(--protein)"
                          : "var(--ink2)";
                    heroRight.append(eb);
                    heroRight.append(gap(2));
                    const def = el(
                        "div",
                        "deficit",
                        t.balance === 0
                            ? "0"
                            : t.balance < 0
                              ? `−${Math.abs(t.balance).toLocaleString("en-US")}`
                              : `+${t.balance.toLocaleString("en-US")}`,
                    );
                    def.style.color = isDeficit
                        ? "var(--positive)"
                        : t.balance > 0
                          ? "var(--protein)"
                          : "var(--ink2)";
                    heroRight.append(def);
                    hero.append(heroRight);
                }
                w.append(hero);
                w.append(gap(9));

                // ===== CALORIE BAR =====
                const cal = el("div", "calbar");
                const fill = el("div", "fill");
                const fr =
                    target > 0
                        ? Math.max(0, Math.min(1, t.calories_in / target))
                        : 0;
                fill.style.width = `${fr * 100}%`;
                cal.append(fill);
                cal.append(el("div", "tick"));
                w.append(cal);
                w.append(gap(11));

                // ===== MACROS =====
                const macros = el("div", "macros");
                macros.append(
                    macroCol(
                        "Protein",
                        "protein",
                        t.macros.protein_g.actual,
                        t.macros.protein_g.target_rda,
                    ),
                );
                macros.append(
                    macroCol(
                        "Carbs",
                        "carbs",
                        t.macros.carbs_g.actual,
                        t.macros.carbs_g.target_rda,
                    ),
                );
                const fatTarget =
                    t.macros.fat_g.target_min && t.macros.fat_g.target_max
                        ? (t.macros.fat_g.target_min + t.macros.fat_g.target_max) /
                          2
                        : null;
                macros.append(
                    macroCol("Fat", "fat", t.macros.fat_g.actual, fatTarget),
                );
                w.append(macros);
                w.append(gap(12));
                w.append(el("div", "rule"));
                w.append(gap(8));

                // ===== FORECAST | WEIGHT =====
                const fcwt = el("div", "fcwt");
                fcwt.append(renderForecast(data));
                fcwt.append(renderWeight(data));
                w.append(fcwt);
                w.append(gap(10));
                w.append(el("div", "rule"));
                w.append(gap(8));

                // ===== WEEK BARS =====
                w.append(renderWeekBars(data, target));

                // Flex spacer + soft rule + footer
                const flex = el("div", "flex-spacer");
                w.append(flex);
                w.append(el("div", "rule-soft"));
                w.append(gap(8));
                w.append(renderFooter(data));
            }

            function spaceCaps(s) {
                return s.toUpperCase().split("").join(" ");
            }

            function macroCol(label, kind, actual, target) {
                const col = el("div", `macro ${kind}`);
                const head = el("div", "head");
                const name = el("div", "name", spaceCaps(label));
                head.append(name);
                const pct =
                    target && target > 0
                        ? Math.round((actual / target) * 100)
                        : null;
                head.append(el("div", "pct", pct != null ? `${pct}%` : ""));
                col.append(head);
                const vals = el("div", "vals");
                const cur = el("span", "cur", String(Math.round(actual)));
                vals.append(cur);
                vals.append(
                    el("span", "slash", target ? `/${Math.round(target)}g` : "g"),
                );
                col.append(vals);
                const pbar = el("div", "pbar");
                const i = el("i");
                const fr = target ? Math.max(0, Math.min(1, actual / target)) : 0;
                i.style.width = `${fr * 100}%`;
                pbar.append(i);
                col.append(pbar);
                return col;
            }

            function renderForecast(data) {
                const f = data.weight_forecast ?? { targets: [], rationale: "" };
                const wrap = el("div", "forecast");
                wrap.append(el("div", "eyebrow", spaceCaps("Forecast")));
                wrap.append(gap(5));
                (f.targets ?? []).forEach((t, i) => {
                    const row = el("div", "frow");
                    const lhs = el("div");
                    lhs.append(el("span", "kg", `${t.goal_kg}`));
                    lhs.append(el("span", "kgunit", "kg"));
                    row.append(lhs);
                    const rhs = el("div", "rhs");
                    if (t.reached) {
                        rhs.append(el("span", "date", "reached"));
                    } else if (t.eta_date && t.eta_days != null) {
                        rhs.append(el("span", "date", fmtMonthDay(t.eta_date)));
                        rhs.append(el("span", "days", `· ${t.eta_days}d`));
                    } else {
                        rhs.append(el("span", "days", "awaiting data"));
                    }
                    row.append(rhs);
                    wrap.append(row);
                });
                if (f.rationale) {
                    wrap.append(el("div", "pace", f.rationale));
                }
                return wrap;
            }

            function renderWeight(data) {
                const wrap = el("div", "weight");
                const weeks = data.weight_graph?.weeks ?? [];
                const filled = weeks.filter((w) => w.min_weight_kg != null);
                const head = el("div", "whead");
                head.append(el("div", "eyebrow", spaceCaps("Weight")));
                const sum = el("div", "wsum");
                if (filled.length) {
                    const latest = filled[filled.length - 1].min_weight_kg;
                    sum.append(el("span", "latest", latest.toFixed(1)));
                    if (filled.length >= 2) {
                        sum.append(el("span", "muted", " · "));
                        const delta =
                            latest - filled[0].min_weight_kg;
                        sum.append(
                            el(
                                "span",
                                "delta",
                                `${delta < 0 ? "−" : delta > 0 ? "+" : ""}${Math.abs(delta).toFixed(1)}`,
                            ),
                        );
                    }
                }
                head.append(sum);
                wrap.append(head);
                wrap.append(renderSparkline(weeks));
                return wrap;
            }

            function renderSparkline(weeks) {
                const svg = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "svg",
                );
                svg.setAttribute("class", "sparkline");
                svg.setAttribute("viewBox", "0 0 140 42");
                svg.setAttribute("preserveAspectRatio", "none");
                const points = weeks
                    .map((w, i) => ({ i, v: w.min_weight_kg }))
                    .filter((p) => p.v != null);
                if (points.length < 2) return svg;
                const padTop = 4,
                    padBottom = 10,
                    padLeft = 0,
                    padRight = 0;
                const w = 140,
                    h = 42;
                const plotW = w - padLeft - padRight;
                const plotH = h - padTop - padBottom;
                const ys = points.map((p) => p.v);
                const minV = Math.min(...ys) - 0.3;
                const maxV = Math.max(...ys) + 0.3;
                const range = Math.max(0.5, maxV - minV);
                const xFor = (i) =>
                    padLeft + (i / Math.max(1, weeks.length - 1)) * plotW;
                const yFor = (v) =>
                    padTop + plotH - ((v - minV) / range) * plotH;

                // Area
                const gradId = "ga_" + Math.random().toString(36).slice(2, 8);
                const defs = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "defs",
                );
                const grad = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "linearGradient",
                );
                grad.setAttribute("id", gradId);
                grad.setAttribute("x1", "0");
                grad.setAttribute("x2", "0");
                grad.setAttribute("y1", "0");
                grad.setAttribute("y2", "1");
                const s1 = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "stop",
                );
                s1.setAttribute("offset", "0%");
                s1.setAttribute("stop-color", "var(--positive)");
                s1.setAttribute("stop-opacity", "0.25");
                const s2 = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "stop",
                );
                s2.setAttribute("offset", "100%");
                s2.setAttribute("stop-color", "var(--positive)");
                s2.setAttribute("stop-opacity", "0");
                grad.append(s1, s2);
                defs.append(grad);
                svg.append(defs);

                let lineD = "";
                points.forEach((p, i) => {
                    const x = xFor(p.i),
                        y = yFor(p.v);
                    lineD += `${i === 0 ? "M" : "L"}${x.toFixed(2)} ${y.toFixed(2)} `;
                });
                const areaD = `${lineD} L${xFor(points[points.length - 1].i).toFixed(2)} ${h} L${xFor(points[0].i).toFixed(2)} ${h} Z`;
                const area = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "path",
                );
                area.setAttribute("d", areaD);
                area.setAttribute("fill", `url(#${gradId})`);
                svg.append(area);

                // Target hairline at 86% of plot height
                const tgY = padTop + plotH * 0.86;
                const tline = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "line",
                );
                tline.setAttribute("x1", 0);
                tline.setAttribute("x2", w);
                tline.setAttribute("y1", tgY);
                tline.setAttribute("y2", tgY);
                tline.setAttribute("stroke", "var(--ink3)");
                tline.setAttribute("stroke-width", "0.6");
                tline.setAttribute("stroke-dasharray", "1 3");
                tline.setAttribute("opacity", "0.65");
                svg.append(tline);

                const line = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "path",
                );
                line.setAttribute("d", lineD);
                line.setAttribute("fill", "none");
                line.setAttribute("stroke", "var(--chartLine)");
                line.setAttribute("stroke-width", "1.2");
                line.setAttribute("stroke-linecap", "round");
                line.setAttribute("stroke-linejoin", "round");
                svg.append(line);

                // Dots — last has halo + larger dot in positive color
                points.forEach((p, idx) => {
                    const x = xFor(p.i),
                        y = yFor(p.v);
                    const isLast = idx === points.length - 1;
                    if (isLast) {
                        const halo = document.createElementNS(
                            "http://www.w3.org/2000/svg",
                            "circle",
                        );
                        halo.setAttribute("cx", x);
                        halo.setAttribute("cy", y);
                        halo.setAttribute("r", 4);
                        halo.setAttribute("fill", "var(--positive)");
                        halo.setAttribute("opacity", 0.18);
                        svg.append(halo);
                    }
                    const c = document.createElementNS(
                        "http://www.w3.org/2000/svg",
                        "circle",
                    );
                    c.setAttribute("cx", x);
                    c.setAttribute("cy", y);
                    c.setAttribute("r", isLast ? 2.2 : 1.8);
                    c.setAttribute(
                        "fill",
                        isLast ? "var(--positive)" : "var(--chartLine)",
                    );
                    svg.append(c);
                });

                return svg;
            }

            function renderWeekBars(data, target) {
                const wrap = el("div", "week");
                const head = el("div", "whead");
                head.append(el("div", "eyebrow", spaceCaps("Week · kcal")));
                const right = el("div", "right");
                right.innerHTML = `avg <span class="avg-num">${fmt(data.week.avg_calories)}</span>  <span class="muted">·  target ${fmt(target)}</span>`;
                head.append(right);
                wrap.append(head);

                const cells = data.week_strip ?? [];
                const values = cells.map((c) => c.calories_in);
                const max = Math.max(target * 1.1, ...values);
                const bars = el("div", "bars");
                cells.forEach((c) => {
                    const col = el("div", "col");
                    if (c.is_today) col.classList.add("today");
                    if (c.calories_in > target) col.classList.add("over");
                    col.append(el("div", "dl", c.weekday_short));
                    const box = el("div", "barbox");
                    const tgt = el("div", "target-line");
                    tgt.style.top = `${(1 - target / max) * 42}px`;
                    box.append(tgt);
                    const bar = el("div", "bar");
                    bar.style.height = `${(c.calories_in / max) * 42}px`;
                    box.append(bar);
                    col.append(box);
                    col.append(el("div", "val", fmt(c.calories_in)));
                    const dlta = c.calories_in - target;
                    col.append(
                        el(
                            "div",
                            "delta",
                            dlta === 0
                                ? "0"
                                : dlta < 0
                                  ? `−${Math.abs(dlta).toLocaleString("en-US")}`
                                  : `+${dlta.toLocaleString("en-US")}`,
                        ),
                    );
                    bars.append(col);
                });
                wrap.append(bars);
                return wrap;
            }

            function renderFooter(data) {
                const row = el("div", "footer");
                const l = el("div", "l");
                l.innerHTML = `<span class="steps">${fmt(data.today.steps)}</span><span class="muted"> steps · wk </span><span class="wkavg">${signed(data.week.avg_balance)}</span><span class="muted">/d</span>`;
                row.append(l);
                row.append(
                    el(
                        "div",
                        "r",
                        new Date().toLocaleTimeString([], {
                            hour: "numeric",
                            minute: "2-digit",
                        }),
                    ),
                );
                return row;
            }
            function signed(n) {
                if (n == null || isNaN(n)) return "—";
                const r = Math.round(n);
                if (r === 0) return "0";
                return r > 0 ? `+${r}` : `−${Math.abs(r)}`;
            }

            // Theme + palette controls
            const initialTheme = params.get("theme") === "dark" ? "dark" : "light";
            const initialPalette =
                params.get("palette") === "vault" ? "vault" : "sunset";
            document.documentElement.setAttribute("data-theme", initialTheme);
            document.documentElement.setAttribute("data-palette", initialPalette);
            const zoom = parseFloat(params.get("zoom"));
            if (Number.isFinite(zoom) && zoom > 0) {
                document.documentElement.style.setProperty("--zoom", String(zoom));
            }
            function syncButtons() {
                const cur = document.documentElement.getAttribute("data-theme");
                const pal = document.documentElement.getAttribute("data-palette");
                document.querySelectorAll("[data-theme-btn]").forEach((b) => {
                    b.setAttribute(
                        "aria-pressed",
                        b.dataset.themeBtn === cur ? "true" : "false",
                    );
                });
                document.querySelectorAll("[data-palette-btn]").forEach((b) => {
                    b.setAttribute(
                        "aria-pressed",
                        b.dataset.paletteBtn === pal ? "true" : "false",
                    );
                });
            }
            syncButtons();
            document.querySelectorAll("[data-theme-btn]").forEach((b) => {
                b.addEventListener("click", () => {
                    document.documentElement.setAttribute("data-theme", b.dataset.themeBtn);
                    syncButtons();
                });
            });
            document.querySelectorAll("[data-palette-btn]").forEach((b) => {
                b.addEventListener("click", () => {
                    document.documentElement.setAttribute("data-palette", b.dataset.paletteBtn);
                    syncButtons();
                });
            });

            async function load() {
                const meta = document.getElementById("metaInfo");
                const token = params.get("token");
                const date = params.get("date");
                if (!token) {
                    meta.textContent = "sample data — append ?token=… for real";
                    render(SAMPLE);
                    return;
                }
                meta.textContent = "loading real data…";
                const url = date
                    ? `/dashboard/nutrition?date=${encodeURIComponent(date)}`
                    : `/dashboard/nutrition`;
                try {
                    const r = await fetch(url, {
                        headers: { Authorization: `Bearer ${token}` },
                    });
                    if (!r.ok) {
                        const t = await r.text();
                        throw new Error(`${r.status}: ${t.slice(0, 120)}`);
                    }
                    const data = await r.json();
                    meta.textContent = `live · selected ${data.selected_date}`;
                    render(data);
                } catch (err) {
                    meta.textContent = `error — falling back to sample: ${err.message}`;
                    render(SAMPLE);
                }
            }
            load();
        </script>
    </body>
</html>
