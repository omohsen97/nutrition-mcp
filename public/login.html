<!doctype html>
<html>
    <head>
        <title>Nutrition MCP — Sign In</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <link rel="icon" href="/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
        />
    </head>
    <body>
        <section class="section">
            <div class="container" style="max-width: 400px">
                <h1 class="title is-3 has-text-centered">Nutrition MCP</h1>
                <p class="subtitle is-6 has-text-grey has-text-centered">
                    Sign in or create an account to connect
                </p>
                {{ERROR}}
                <form method="POST" action="/approve">
                    <input
                        type="hidden"
                        name="session_id"
                        value="{{SESSION_ID}}"
                    />
                    <div class="field">
                        <label class="label" for="email">Email</label>
                        <div class="control">
                            <input
                                class="input"
                                type="email"
                                id="email"
                                name="email"
                                required
                                autocomplete="email"
                            />
                        </div>
                    </div>
                    <div class="field">
                        <label class="label" for="password">Password</label>
                        <div class="control">
                            <input
                                class="input"
                                type="password"
                                id="password"
                                name="password"
                                required
                                minlength="6"
                                autocomplete="current-password"
                            />
                        </div>
                    </div>
                    <div class="field is-grouped mt-5">
                        <div class="control is-expanded">
                            <button
                                type="submit"
                                name="action"
                                value="login"
                                class="button is-link is-fullwidth"
                            >
                                Sign In
                            </button>
                        </div>
                        <div class="control is-expanded">
                            <button
                                type="submit"
                                name="action"
                                value="register"
                                class="button is-light is-fullwidth"
                            >
                                Register
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </body>
</html>
